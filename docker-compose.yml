services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-nexus}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-nexus_redis_secure}"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "8000:8000"
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-nexus}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus_redis_secure}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nexus_redis_secure}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-nexus-twos}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@nexus.com}
      NON_BILLING_PREMIUM_EMAILS: ${NON_BILLING_PREMIUM_EMAILS:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - /var/log/nexus:/var/log/nexus
      - ./storage:/app/storage

  worker:
    build:
      context: ./backend
    command: python -m workers.queue_worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-nexus}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus_redis_secure}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nexus_redis_secure}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-nexus-twos}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@nexus.com}
      NON_BILLING_PREMIUM_EMAILS: ${NON_BILLING_PREMIUM_EMAILS:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - /var/log/nexus:/var/log/nexus

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./admin:/var/www/pages:ro
    depends_on:
      - backend

  # ============================================
  # SERVIÇOS DE MONITORAMENTO
  # ============================================

  # Prometheus - Coleta de métricas
  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'

  # Grafana - Visualização de métricas
  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-change_me_in_production}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SECURITY_ADMIN_PASSWORD_RESET_LINK_ENABLED: 'true'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # Alertmanager - Gerenciamento de alertas
  alertmanager:
    image: prom/alertmanager:latest
    restart: always
    ports:
      - "9093:9093"
    environment:
      SMTP_USER: ${SMTP_USER:-noreply@nexus.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-change_me_in_production}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@nexus.com}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-0}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@nexus.com}
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager_templates.tmpl:/etc/alertmanager/templates/template.tmpl:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

  # PostgreSQL Exporter - Métricas do PostgreSQL
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: always
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/nexus?sslmode=disable"
    depends_on:
      - postgres

  # Redis Exporter - Métricas do Redis
  redis_exporter:
    image: oliver006/redis_exporter:latest
    restart: always
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis

  # Node Exporter - Métricas do Sistema Operacional
  node_exporter:
    image: prom/node-exporter:latest
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  # cAdvisor - Métricas de Containers Docker
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
