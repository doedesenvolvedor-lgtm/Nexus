apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nexus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nexus/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/nexus
            - name: REDIS_URL
              value: redis://redis:6379/0
