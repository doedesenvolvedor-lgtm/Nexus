name: nexus_mobile
description: Nexus Streaming mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  video_player: ^2.8.2
  chewie: ^1.8.1
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  flutter_local_notifications: ^16.3.0
  intl: ^0.19.0
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.7.0
  firebase_crashlytics: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
