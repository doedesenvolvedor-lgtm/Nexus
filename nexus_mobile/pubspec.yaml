name: nexustwos
description: Nexustwos - Seu universo de entretenimento
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^4.2.0
  
  # State Management & Networking
  http: ^1.2.0
  provider: ^6.1.2
  dio: ^5.3.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Video Player
  video_player: ^2.8.2
  chewie: ^1.8.1
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.7.0
  firebase_crashlytics: ^3.4.0
  firebase_auth: ^4.10.0
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.6
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  logger: ^2.0.0
  
  # Navigation
  go_router: ^10.0.0
  
  # Animations & Gestures
  animations: ^2.0.0
  liquid_swipe: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/fonts/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
