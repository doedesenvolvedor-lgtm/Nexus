events {}

http {
  upstream nexus_backend {
    server backend:8000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Security Headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # MIME types
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Bloco comum para o desafio HTTP-01 do Certbot.
  # O plugin webroot grava arquivos em /var/www/certbot/.well-known/acme-challenge/
  server {
    listen 80 default_server;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 404;
    }
  }

  server {
    listen 80;
    server_name api.nexusstream.com;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 80;
    server_name admin.nexusstream.com;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 80;
    server_name privacy.nexusstream.com politicadeprivacidade.nexustwos.com;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 80;
    server_name terms.nexusstream.com termosdeuso.nexustwos.com;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 80;
    server_name nexusstream.com www.nexusstream.com;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location = /privacy {
      return 301 https://privacy.nexusstream.com;
    }

    location = /terms {
      return 301 https://terms.nexusstream.com;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # =====================
  # TLS SERVER BLOCKS
  # =====================

  server {
    listen 443 ssl;
    server_name api.nexusstream.com;

    ssl_certificate /etc/letsencrypt/live/api.nexusstream.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nexusstream.com/privkey.pem;

    location / {
      proxy_pass http://nexus_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  server {
    listen 443 ssl;
    server_name admin.nexusstream.com;

    ssl_certificate /etc/letsencrypt/live/admin.nexusstream.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.nexusstream.com/privkey.pem;

    location / {
      proxy_pass http://nexus_backend/admin/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  server {
    listen 443 ssl;
    server_name privacy.nexusstream.com;

    ssl_certificate /etc/letsencrypt/live/privacy.nexusstream.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/privacy.nexusstream.com/privkey.pem;

    location / {
      alias /var/www/pages/;
      try_files /privacy.html =404;
      default_type text/html;
      add_header Cache-Control "public, max-age=3600";
    }
  }

  server {
    listen 443 ssl;
    server_name politicadeprivacidade.nexustwos.com;

    ssl_certificate /etc/letsencrypt/live/politicadeprivacidade.nexustwos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/politicadeprivacidade.nexustwos.com/privkey.pem;

    location / {
      alias /var/www/pages/;
      try_files /privacy.html =404;
      default_type text/html;
      add_header Cache-Control "public, max-age=3600";
    }
  }

  server {
    listen 443 ssl;
    server_name terms.nexusstream.com;

    ssl_certificate /etc/letsencrypt/live/terms.nexusstream.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terms.nexusstream.com/privkey.pem;

    location / {
      alias /var/www/pages/;
      try_files /terms.html =404;
      default_type text/html;
      add_header Cache-Control "public, max-age=3600";
    }
  }

  server {
    listen 443 ssl;
    server_name termosdeuso.nexustwos.com;

    ssl_certificate /etc/letsencrypt/live/termosdeuso.nexustwos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/termosdeuso.nexustwos.com/privkey.pem;

    location / {
      alias /var/www/pages/;
      try_files /terms.html =404;
      default_type text/html;
      add_header Cache-Control "public, max-age=3600";
    }
  }

  server {
    listen 443 ssl;
    server_name nexusstream.com www.nexusstream.com;

    ssl_certificate /etc/letsencrypt/live/nexusstream.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexusstream.com/privkey.pem;

    # Security Headers para o servidor principal
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Servir arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      alias /var/www/pages/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # Arquivos SEO
    location = /robots.txt {
      alias /var/www/pages/robots.txt;
      add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
      alias /var/www/pages/sitemap.xml;
      add_header Content-Type "application/xml";
      add_header Cache-Control "public, max-age=86400";
    }

    # Página inicial
    location = / {
      alias /var/www/pages/index.html;
      try_files /index.html =404;
      add_header Cache-Control "public, max-age=3600";
    }

    # Redirects para páginas legais
    location = /privacy {
      return 301 https://privacy.nexusstream.com;
    }

    location = /terms {
      return 301 https://terms.nexusstream.com;
    }

    # Health check
    location = /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }

    # Deny all other requests
    location / {
      return 404;
    }
  }
