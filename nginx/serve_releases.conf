# Configuração para servir releases (APK/AAB) na porta 8080
# Uso: nginx -c nginx/serve_releases.conf
# Ou inclua no nginx.conf principal

server {
    listen 8080;
    server_name localhost;

    # CORS headers para permitir download
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;

    # Servir arquivos da pasta releases
    location /releases/ {
        alias /workspaces/Nexus/backend/storage/releases/;
        autoindex on;
        autoindex_exact_size on;
        autoindex_localtime on;
        
        # Headers de download
        add_header Content-Disposition "attachment" always;
        
        # Cache de 1 hora para arquivos estáticos
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Página inicial listando releases
    location = / {
        return 302 /releases/;
    }
}
